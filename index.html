<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💕</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6ea,#ffe8f3);
    font-family:sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:30px;
    border-radius:30px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.dog{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:15px;
}

h1{
    color:#ff5c9f;
    font-size:22px;
}

.date-option{
    display:block;
    margin:12px 0;
    font-size:20px;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:20px;
    cursor:pointer;
    font-size:18px;
    margin:10px;
}

#yesBtn{
    background:#ff69b4;
    color:white;
}

#noBtn{
    background:#c084fc;
    color:white;
    position:relative;
}

.message{
    margin-top:20px;
    color:#ff5c9f;
    font-weight:bold;
    font-size:18px;
}

.heart{
    position:fixed;
    font-size:24px;
    animation:floatUp 2s linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        opacity:1;
        transform:translateY(0);
    }
    to{
        opacity:0;
        transform:translateY(-250px);
    }
}
</style>
</head>

<body>

<div class="card">

<img src="pitbull.png" class="dog">

<h1>🌸 Will you go on a date with me? 🌸</h1>

<p>Choose a day 💕</p>

<label class="date-option">
<input type="radio" name="date" value="7月8日">
🌸 7月8日
</label>

<label class="date-option">
<input type="radio" name="date" value="8月8日">
💕 8月8日
</label>

<label class="date-option">
<input type="radio" name="date" value="8月26日">
🎂 8月26日
</label>

<button id="yesBtn">YES 💖</button>
<button id="noBtn">NO</button>

<div id="message" class="message"></div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

yesBtn.addEventListener("click",()=>{

    const selected =
    document.querySelector('input[name="date"]:checked');

    if(!selected){
        alert("日付を選んでね💕");
        return;
    }
message.innerHTML =
“🥰 “ + selected.value +
“ に決定！一緒に素敵な思い出を作ろうね🐶💕”;

setTimeout(()=>{

const text =
“デートの日は “ +
selected.value +
“ にしたよ💖🥰”;

window.open(
“https://line.me/R/msg/text/?” +
encodeURIComponent(text),
“_blank”
);

},1000);    

    for(let i=0;i<30;i++){

        const heart =
        document.createElement("div");

        heart.className="heart";
        heart.innerHTML="💖";

        heart.style.left =
        Math.random()*window.innerWidth+"px";

        heart.style.top =
        Math.random()*window.innerHeight+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },2000);
    }
});

noBtn.addEventListener("mouseover",()=>{

    noBtn.style.position="fixed";

    noBtn.style.left =
    Math.random()*(window.innerWidth-120)+"px";

    noBtn.style.top =
    Math.random()*(window.innerHeight-60)+"px";
});
</script>

</body>
</html>
